name: Hourly Discord Report
# Gửi ảnh Use Case Breakdown về Discord mỗi giờ (Vercel Hobby cron chỉ 1 lần/ngày nên dùng GitHub Actions).
on:
  schedule:
    - cron: '0 * * * *'   # mỗi giờ (UTC); GitHub có thể trễ vài phút
  workflow_dispatch: {}    # cho phép bấm chạy tay
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger image report
        run: |
          curl -fsS "https://meta-ads-deploy-three.vercel.app/api/cron-image?key=${{ secrets.CRON_SECRET }}&t=$(date +%s)" || exit 1
